name = "yourbar-share-api"
main = "src/index.ts"
compatibility_date = "2026-05-14"

[vars]
PUBLIC_BASE_URL = "https://api.yourbar.app"
APP_DEEP_LINK_SCHEME = "yourbar"
DEFAULT_RECIPE_TTL_SECONDS = "2592000"
MAX_RECIPE_PAYLOAD_BYTES = "65536"
MAX_IMAGE_BYTES = "5242880"
CORS_ALLOWED_ORIGINS = "http://localhost:8081,https://yourbar.app,https://www.yourbar.app"
IMAGE_CLEANUP_BATCH_SIZE = "100"
ANDROID_PACKAGE_NAME = "com.yourbarapp.free"
ANDROID_SHA256_CERT_FINGERPRINTS = "BE:00:A6:2A:71:AB:5B:F1:17:F7:97:B2:74:1C:1E:03:1D:77:C4:81:FD:60:7E:22:C4:B0:45:7B:DD:79:6D:F7"
COMMUNITY_FEATURE_ENABLED = "false"
COMMUNITY_SUBMISSIONS_ENABLED = "false"
COMMUNITY_ADMIN_ENABLED = "false"
COMMUNITY_PUBLIC_FEED_ENABLED = "false"
AUTH_JWT_SUB_CLAIM = "sub"
AUTH_TRUSTED_USER_HEADER_ENABLED = "false"
COMMUNITY_TEST_USER_HEADER = "X-YourBar-User-Id"

[[kv_namespaces]]
binding = "RECIPE_SHARES"
id = "acb85cb9781546a69352db12a4ce3500"
preview_id = "54bd8939bd96400b802f70122b9f4d09"

[[r2_buckets]]
binding = "RECIPE_IMAGES"
bucket_name = "yourbar-recipe-images"
preview_bucket_name = "yourbar-recipe-images-preview"

[triggers]
crons = ["0 3 * * *"]


[env.staging]
name = "yourbar-share-api-staging"

[env.staging.vars]
PUBLIC_BASE_URL = "https://staging-api.yourbar.app"
APP_DEEP_LINK_SCHEME = "yourbar"
DEFAULT_RECIPE_TTL_SECONDS = "2592000"
MAX_RECIPE_PAYLOAD_BYTES = "65536"
MAX_IMAGE_BYTES = "5242880"
CORS_ALLOWED_ORIGINS = "http://localhost:8081,https://yourbar.app,https://www.yourbar.app,https://staging-api.yourbar.app"
IMAGE_CLEANUP_BATCH_SIZE = "100"
ANDROID_PACKAGE_NAME = "com.yourbarapp.free"
ANDROID_SHA256_CERT_FINGERPRINTS = "BE:00:A6:2A:71:AB:5B:F1:17:F7:97:B2:74:1C:1E:03:1D:77:C4:81:FD:60:7E:22:C4:B0:45:7B:DD:79:6D:F7"
COMMUNITY_FEATURE_ENABLED = "true"
COMMUNITY_SUBMISSIONS_ENABLED = "true"
COMMUNITY_ADMIN_ENABLED = "true"
COMMUNITY_PUBLIC_FEED_ENABLED = "true"
AUTH_JWT_SUB_CLAIM = "sub"
AUTH_TRUSTED_USER_HEADER_ENABLED = "false"
COMMUNITY_TEST_USER_HEADER = "X-YourBar-User-Id"

[[env.staging.kv_namespaces]]
binding = "RECIPE_SHARES"
id = "ed38cc29d8c04b9697c51e584247af0b"

[[env.staging.r2_buckets]]
binding = "RECIPE_IMAGES"
bucket_name = "yourbar-recipe-images-staging"

[env.staging.triggers]
crons = ["0 3 * * *"]